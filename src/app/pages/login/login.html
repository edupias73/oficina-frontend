<div class="login-split">
  <div class="split-left">
    <div class="logo-container">
      <h1>⚙️ Nitro Gestor</h1>
      <p>Gestão Inteligente para a sua Oficina</p>
    </div>
  </div>

  <div class="split-right">
    <div class="form-container">
      <h2 class="form-title">Acesse sua conta</h2>

      <div class="alert-error" *ngIf="erroLogin">{{ erroLogin }}</div>

      <form (ngSubmit)="entrar()">
        <div class="input-group">
          <label>Código da Oficina</label>
          <input
            type="text"
            name="codigo"
            [(ngModel)]="loginData.codigoEmpresa"
            placeholder="Ex: OFC-001"
            autocomplete="off"
            style="text-transform: uppercase"
            required
          />
        </div>

        <div class="input-group">
          <label>Usuário (E-mail)</label>
          <input
            type="email"
            name="login"
            [(ngModel)]="loginData.login"
            placeholder="seu@email.com"
            autocomplete="username"
            required
          />
        </div>

        <div class="input-group">
          <label>Senha</label>
          <input
            type="password"
            name="senha"
            [(ngModel)]="loginData.senha"
            placeholder="********"
            autocomplete="current-password"
            required
          />
        </div>

        <button type="submit" class="btn-entrar" [disabled]="carregando">
          {{ carregando ? 'A entrar...' : 'Entrar' }}
        </button>
      </form>

      <div class="registro-link">
        <p>Sua oficina ainda não usa o Nitro Gestor?</p>
        <a href="javascript:void(0)" (click)="irParaRegistro()">Criar uma conta agora</a>
      </div>
    </div>
  </div>
</div>
