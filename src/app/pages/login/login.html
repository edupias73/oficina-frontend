<div class="login-split">
  <div class="split-left">
    <div class="logo-container">
      <h1>⚙️ Nitro Gestor</h1>
      <p>Gestão Inteligente para a sua Oficina</p>
    </div>
  </div>

  <div class="split-right">
    <div class="form-container">
      <h2 class="form-title">Acesse sua conta</h2>

      <div class="alert-error" *ngIf="erroLogin">{{ erroLogin }}</div>

      <form (ngSubmit)="entrar()">
        
        <div class="input-group">
          <label>Usuário (E-mail)</label>
          <input
            type="email"
            name="login"
            [(ngModel)]="loginData.login"
            pattern="[a-z0-9._%+\-]+@[a-z0-9.\-]+\.[a-z]{2,}$"
            placeholder="seu@email.com"
            autocomplete="username"
            #emailInput="ngModel"
            required
          />
          <small class="erro-texto" *ngIf="emailInput.invalid && emailInput.touched" style="color: red; font-size: 12px; margin-top: 4px; display: block;">
            Por favor, digite um e-mail válido.
          </small>
        </div>

        <div class="input-group">
          <label>Senha</label>
          <input
            type="password"
            name="senha"
            [(ngModel)]="loginData.senha"
            placeholder="********"
            autocomplete="current-password"
            required
          />
        </div>

        <button type="submit" class="btn-entrar" [disabled]="carregando || emailInput.invalid" style="display: flex; align-items: center; justify-content: center; gap: 10px;">
          <span *ngIf="carregando" class="spinner"></span>
          {{ carregando ? 'A validar dados...' : 'Entrar' }}
        </button>
      </form>

      <div class="registro-link">
        <p>Sua oficina ainda não usa o Nitro Gestor?</p>
        <a href="javascript:void(0)" (click)="irParaRegistro()">Criar uma conta agora</a>
      </div>
    </div>
  </div>
</div>
