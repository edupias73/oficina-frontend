<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h1>Nitro<span>Gestor</span></h1>
      <p>Acesso ao painel da oficina</p>
    </div>

    <div class="login-body">
      <div class="alerta-erro" *ngIf="erroLogin">
        {{ erroLogin }}
      </div>

      <div class="grupo-form">
        <label>Código da Oficina</label>
        <input
          type="text"
          class="input-padrao"
          [(ngModel)]="loginData.codigoEmpresa"
          placeholder="Ex: NITRO-001"
          style="text-transform: uppercase"
        />
        <small class="dica">Solicite o código ao gerente da sua unidade.</small>
      </div>

      <div class="divider"><span>Suas Credenciais</span></div>

      <div class="grupo-form">
        <label>E-mail de Acesso</label>
        <input
          type="email"
          class="input-padrao"
          [(ngModel)]="loginData.login"
          placeholder="seu@email.com"
        />
      </div>

      <div class="grupo-form">
        <label>Senha</label>
        <input
          type="password"
          class="input-padrao"
          [(ngModel)]="loginData.senha"
          placeholder="••••••••"
          (keyup.enter)="entrar()"
        />
      </div>

      <button class="btn-login" (click)="entrar()" [disabled]="carregando">
        <span *ngIf="!carregando">Entrar no Sistema</span>
        <span *ngIf="carregando">Autenticando... ⚙️</span>
      </button>
    </div>
  </div>
</div>
